name: Validate registry contribution

on:
  pull_request:
    paths:
      - "entries/**"
      - "schemas/mod-entry.schema.json"
      - "tools/build_registry.py"
      - "tests/**"
      - ".github/workflows/validate-registry.yml"
      - ".github/pull_request_template.md"
      - ".github/CODEOWNERS"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pull Request
        uses: actions/checkout@v6

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate entries and resolve public GitHub Releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 tools/build_registry.py \
            --entries entries \
            --output "$RUNNER_TEMP/registry-v1.unsigned.json"

      - name: Display generated unsigned registry
        run: |
          python3 -m json.tool "$RUNNER_TEMP/registry-v1.unsigned.json"
