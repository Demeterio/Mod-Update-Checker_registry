name: Validate registry contribution

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Pull Request
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Compile Python tools
        run: |
          python3 -m py_compile \
            tools/build_registry.py \
            tools/build_and_sign_registry.py

      - name: Run unit tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate entries and resolve public GitHub Releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 tools/build_registry.py \
            --entries entries \
            --output "$RUNNER_TEMP/registry-v1.unsigned.json" \
            --readable-output "$RUNNER_TEMP/registry-v1-readable.json"

      - name: Validate unsigned registry with signing validator
        run: |
          python3 tools/build_and_sign_registry.py validate \
            --source "$RUNNER_TEMP/registry-v1.unsigned.json"

      - name: Test signing and independent verification with an ephemeral key
        shell: bash
        run: |
          set -euo pipefail

          private_key="$RUNNER_TEMP/muc-test-private-key.pem"
          public_key="$RUNNER_TEMP/muc-test-public-key.pem"
          fingerprint="$RUNNER_TEMP/muc-test-public-key.sha256"
          signed_registry="$RUNNER_TEMP/registry-v1.signed.json"
          key_id="muc-registry-test-only"

          openssl genpkey \
            -algorithm RSA \
            -pkeyopt rsa_keygen_bits:3072 \
            -out "$private_key"

          openssl pkey \
            -in "$private_key" \
            -pubout \
            -out "$public_key"

          openssl pkey \
            -pubin \
            -in "$public_key" \
            -outform DER |
            sha256sum |
            awk '{print $1}' > "$fingerprint"

          python3 tools/build_and_sign_registry.py sign \
            --source "$RUNNER_TEMP/registry-v1.unsigned.json" \
            --private-key "$private_key" \
            --public-key "$public_key" \
            --fingerprint "$fingerprint" \
            --output "$signed_registry" \
            --key-id "$key_id"

          python3 tools/build_and_sign_registry.py verify \
            --source "$signed_registry" \
            --public-key "$public_key" \
            --fingerprint "$fingerprint" \
            --key-id "$key_id"

          python3 -m json.tool "$signed_registry" > /dev/null

          rm -f \
            "$private_key" \
            "$public_key" \
            "$fingerprint" \
            "$signed_registry"

      - name: Display generated registries
        run: |
          python3 -m json.tool \
            "$RUNNER_TEMP/registry-v1.unsigned.json"

          python3 -m json.tool \
            "$RUNNER_TEMP/registry-v1-readable.json"
