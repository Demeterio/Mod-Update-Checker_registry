name: Publish signed registry

on:
  push:
    branches:
      - main
    paths:
      - "source/registry-v1.json"
      - "tools/build_and_sign_registry.py"
      - "security/muc-registry-public-key.pem"
      - "security/muc-registry-public-key.sha256"
      - ".github/workflows/publish-signed-registry.yml"
      - "index.md"
      - "_config.yml"
      - "CNAME"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: muc-registry-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Refuse tracked private keys
        shell: bash
        run: |
          set -euo pipefail
          tracked_private_keys="$(
            git ls-files |
            grep -Ei '(^|/)[^/]*private[^/]*\.pem$' || true
          )"

          if [[ -n "$tracked_private_keys" ]]; then
            echo "A private PEM file is tracked by Git:" >&2
            echo "$tracked_private_keys" >&2
            exit 1
          fi

      - name: Restore private signing key
        shell: bash
        env:
          PRIVATE_KEY_B64: ${{ secrets.MUC_REGISTRY_PRIVATE_KEY_PEM_B64 }}
        run: |
          set -euo pipefail

          if [[ -z "${PRIVATE_KEY_B64:-}" ]]; then
            echo "Missing GitHub Actions secret: MUC_REGISTRY_PRIVATE_KEY_PEM_B64" >&2
            exit 1
          fi

          private_key="$RUNNER_TEMP/muc-registry-private-key.pem"
          printf '%s' "$PRIVATE_KEY_B64" |
            base64 --decode > "$private_key"
          chmod 600 "$private_key"

          openssl pkey \
            -in "$private_key" \
            -check \
            -noout

      - name: Validate, sign, and verify registry
        run: |
          python3 tools/build_and_sign_registry.py sign \
            --source source/registry-v1.json \
            --private-key "$RUNNER_TEMP/muc-registry-private-key.pem" \
            --public-key security/muc-registry-public-key.pem \
            --fingerprint security/muc-registry-public-key.sha256 \
            --output generated/registry-v1.json \
            --key-id muc-registry-2026-01

      - name: Remove private signing key
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/muc-registry-private-key.pem"

      - name: Commit generated signed registry
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main

          if [[ "$(git rev-parse HEAD)" != "$(git rev-parse origin/main)" ]]; then
            echo "main changed during this run. A newer workflow run must publish it." >&2
            exit 1
          fi

          git add generated/registry-v1.json

          if git diff --cached --quiet; then
            echo "The signed registry is already current."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "Publish signed registry — Generated by GitHub Actions [skip ci]"
            git push origin HEAD:main
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@v1
        with:
          source: ./
          destination: ./_site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
