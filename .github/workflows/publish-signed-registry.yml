name: Publish signed registry

on:
  push:
    branches:
      - main
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: muc-registry-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Refuse tracked private keys
        shell: bash
        run: |
          set -euo pipefail
          tracked_private_keys="$(
            git ls-files |
            grep -Ei '(^|/)[^/]*private[^/]*\.pem$' || true
          )"

          if [[ -n "$tracked_private_keys" ]]; then
            echo "A private PEM file is tracked by Git:" >&2
            echo "$tracked_private_keys" >&2
            exit 1
          fi

      - name: Compile Python tools
        run: |
          python3 -m py_compile \
            tools/build_registry.py \
            tools/build_and_sign_registry.py

      - name: Run registry tests
        run: python3 -m unittest discover -s tests -v

      - name: Resolve reviewed GitHub Releases
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          python3 tools/build_registry.py \
            --entries entries \
            --output "$RUNNER_TEMP/registry-v1.unsigned.json" \
            --readable-output generated/registry-v1-readable.json

      - name: Validate unsigned registry
        run: |
          python3 tools/build_and_sign_registry.py validate \
            --source "$RUNNER_TEMP/registry-v1.unsigned.json"

      - name: Restore private signing key
        shell: bash
        env:
          PRIVATE_KEY_B64: ${{ secrets.MUC_REGISTRY_PRIVATE_KEY_PEM_B64 }}
        run: |
          set -euo pipefail

          if [[ -z "${PRIVATE_KEY_B64:-}" ]]; then
            echo "Missing GitHub Actions secret: MUC_REGISTRY_PRIVATE_KEY_PEM_B64" >&2
            exit 1
          fi

          private_key="$RUNNER_TEMP/muc-registry-private-key.pem"
          printf '%s' "$PRIVATE_KEY_B64" |
            base64 --decode > "$private_key"
          chmod 0600 "$private_key"

          openssl pkey \
            -in "$private_key" \
            -check \
            -noout

      - name: Sign registry
        run: |
          python3 tools/build_and_sign_registry.py sign \
            --source "$RUNNER_TEMP/registry-v1.unsigned.json" \
            --private-key "$RUNNER_TEMP/muc-registry-private-key.pem" \
            --public-key security/muc-registry-public-key.pem \
            --fingerprint security/muc-registry-public-key.sha256 \
            --output generated/registry-v1.json \
            --key-id muc-registry-2026-01

      - name: Independently verify signed registry
        run: |
          python3 tools/build_and_sign_registry.py verify \
            --source generated/registry-v1.json \
            --public-key security/muc-registry-public-key.pem \
            --fingerprint security/muc-registry-public-key.sha256 \
            --key-id muc-registry-2026-01

      - name: Remove private signing key
        if: always()
        shell: bash
        run: |
          rm -f "$RUNNER_TEMP/muc-registry-private-key.pem"

      - name: Prepare public registry files
        shell: bash
        run: |
          set -euo pipefail

          chmod 0644 \
            generated/registry-v1.json \
            generated/registry-v1-readable.json

          test -r generated/registry-v1.json
          test -r generated/registry-v1-readable.json

          python3 -m json.tool \
            generated/registry-v1.json > /dev/null
          python3 -m json.tool \
            generated/registry-v1-readable.json > /dev/null

          ls -l \
            generated/registry-v1.json \
            generated/registry-v1-readable.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5.0.0

      - name: Build site with Jekyll
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1.0.13
        with:
          source: ./
          destination: ./_site

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4.0.0
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
