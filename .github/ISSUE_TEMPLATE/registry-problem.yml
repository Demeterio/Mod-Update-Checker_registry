name: Registry problem
description: Report incorrect registry data, a broken link, a catalogue problem, or a contribution question.
title: "[Registry problem] "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for public, non-sensitive registry problems.

        Do not report vulnerabilities, signing weaknesses, tokens, private keys, or validation bypasses here. Use the private Security reporting link instead.

        To submit an actual entry or file change, open a Pull Request after reading `CONTRIBUTING.md`.

  - type: dropdown
    id: category
    attributes:
      label: Problem category
      description: Select the option that best describes the problem.
      options:
        - Incorrect stable or prerelease version
        - Broken official-page or GitHub link
        - Missing, duplicate, or incorrectly named mod
        - Public catalogue display or search problem
        - Validation or publication problem
        - Documentation problem
        - Contribution question
        - Other non-security problem
    validations:
      required: true

  - type: input
    id: mod-id
    attributes:
      label: Affected mod ID
      description: Provide the exact MUC mod ID when the problem concerns a registry entry.
      placeholder: creator.mod_name.0123456789ABCDEF
    validations:
      required: false

  - type: input
    id: affected-url
    attributes:
      label: Affected public URL
      description: Link to the catalogue page, official mod page, GitHub Release, or registry document involved.
      placeholder: https://...
    validations:
      required: false

  - type: textarea
    id: current-behavior
    attributes:
      label: What is wrong?
      description: Describe what you currently see and why it appears incorrect.
      placeholder: Include the displayed version, broken link, error message, or exact catalogue behavior.
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: What should happen instead?
      description: Describe the correct information or expected behavior.
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: Supporting information
      description: Add public Release links, screenshots, or other non-sensitive evidence.
    validations:
      required: false

  - type: checkboxes
    id: confirmation
    attributes:
      label: Confirmation
      options:
        - label: I searched existing Issues before submitting this report.
          required: true
        - label: This report contains no private keys, tokens, credentials, personal data, or undisclosed security information.
          required: true
